<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app" id="app" data-service="none" data-host="checking">
  <header class="status">
    <span class="dot" aria-hidden="true"></span>
    <span class="svc" id="svc-name">서비스 확인 중</span>
    <span class="host" id="host-state">호스트 확인 중</span>
    <button class="iconbtn" id="btn-options" title="설정" aria-label="설정"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    <button class="iconbtn" id="btn-help" title="사용법 보기" aria-label="사용법 보기">?</button>
  </header>

  <div class="actions">
    <button class="btn primary" id="btn-current">이 대화 가져오기</button>
    <button class="btn" id="btn-all">전체 동기화</button>
  </div>

  <div class="listhead">
    <span class="lbl">대화 <b id="count">—</b></span>
    <button class="ghost" id="btn-toggle-all">전체 선택</button>
  </div>

  <ul class="list" id="list">
    <li class="empty" id="empty">대화 목록을 불러오려면 위 버튼을 누르세요.</li>
  </ul>

  <footer class="bar">
    <button class="btn small" id="btn-selected" disabled>선택 가져오기</button>
    <div class="progress" id="progress" hidden>
      <div class="track"><div class="fill" id="fill"></div></div>
      <span class="num" id="num">0/0</span>
    </div>
    <span class="msg" id="msg"></span>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
