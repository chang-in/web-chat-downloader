name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: 타입 검사
        run: npx tsc --noEmit
      - name: 테스트
        run: npm test
      - name: 확장 스크립트 문법 검사
        run: for f in extension/*.js; do node --check "$f"; done
